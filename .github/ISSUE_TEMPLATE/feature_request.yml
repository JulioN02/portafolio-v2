name: Feature Request

description: Suggest a new feature or improvement
title: "[Feature] "
labels: ["enhancement"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## Thanks for suggesting a feature!

        Please fill out the details below to help us evaluate your suggestion.

  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: A clear description of the feature
      placeholder: Describe the feature you want
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
      placeholder: The problem I'm facing is...

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this problem solved?
      placeholder: I would like to see...

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions you've considered?

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context about the feature request?

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow the project's code of conduct
          required: true
