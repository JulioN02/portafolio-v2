name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm -F @jsoft/shared run build

      - name: Generate Prisma
        run: pnpm -F @jsoft/api prisma generate

      - name: Typecheck
        run: pnpm -r run typecheck

      - name: Test API
        run: pnpm -F @jsoft/api test

      - name: Test shared
        run: pnpm -F @jsoft/shared test

      - name: Test admin-panel
        run: pnpm -F admin-panel test

      - name: Test client-site
        run: pnpm -F client-site test

      - name: Test recruiter-site
        run: pnpm -F recruiter-site test

      - name: Build
        run: pnpm -r run build
