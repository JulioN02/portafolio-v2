name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm -F @jsoft/shared run build

      - name: Generate Prisma
        run: pnpm -F @jsoft/api prisma generate

      - name: Typecheck
        run: pnpm -r run typecheck

      - name: Build
        run: pnpm -r run build
